<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ECFDF5"/>
      <stop offset="1" stop-color="#D1FAE5"/>
    </linearGradient>
    <linearGradient id="acc" x1="836" y1="150" x2="1460" y2="750" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981"/>
      <stop offset="1" stop-color="#0EA5E9"/>
    </linearGradient>
    <filter id="sh" x="-15%" y="-15%" width="130%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#065F46" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="56" fill="url(#bg)"/>
  <circle cx="1378" cy="150" r="150" fill="#FFFFFF" fill-opacity="0.5"/>
  <circle cx="205" cy="775" r="175" fill="#FFFFFF" fill-opacity="0.4"/>
  <circle cx="720" cy="824" r="90" fill="#A7F3D0" fill-opacity="0.55"/>

  <!-- eyebrow -->
  <rect x="120" y="146" width="328" height="58" rx="29" fill="#FFFFFF" fill-opacity="0.78"/>
  <circle cx="158" cy="175" r="11" fill="#10B981"/>
  <text x="188" y="185" fill="#047857" font-size="27" font-family="Inter, Arial, sans-serif" font-weight="700">E-COMMERCE / UI-UX</text>

  <!-- title -->
  <text x="116" y="360" fill="#0F172A" font-size="94" font-family="Poppins, Inter, Arial, sans-serif" font-weight="800">Triply</text>
  <text x="116" y="458" fill="url(#acc)" font-size="86" font-family="Poppins, Inter, Arial, sans-serif" font-weight="800">Travel Booking</text>
  <text x="120" y="526" fill="#3F7A66" font-size="33" font-family="Inter, Arial, sans-serif">Research · UX design · responsive frontend</text>

  <!-- feature chips -->
  <g filter="url(#sh)">
    <rect x="120" y="588" width="300" height="124" rx="26" fill="#FFFFFF"/>
    <rect x="444" y="588" width="300" height="124" rx="26" fill="#FFFFFF"/>
  </g>
  <text x="150" y="652" fill="#047857" font-size="44" font-family="Poppins, Inter, sans-serif" font-weight="800">B2C</text>
  <text x="150" y="694" fill="#6B958A" font-size="26" font-family="Inter, sans-serif">tour booking flow</text>
  <text x="474" y="652" fill="#047857" font-size="44" font-family="Poppins, Inter, sans-serif" font-weight="800">Responsive</text>
  <text x="474" y="694" fill="#6B958A" font-size="26" font-family="Inter, sans-serif">mobile-first UI</text>

  <!-- flight map panel -->
  <g filter="url(#sh)">
    <rect x="836" y="150" width="624" height="356" rx="38" fill="#FFFFFF"/>
  </g>
  <clipPath id="triclip"><rect x="836" y="150" width="624" height="356" rx="38"/></clipPath>
  <g clip-path="url(#triclip)">
    <rect x="836" y="150" width="624" height="356" fill="#F0FDF8"/>
    <circle cx="960" cy="300" r="180" fill="#D1FAE5" fill-opacity="0.6"/>
    <circle cx="1340" cy="430" r="150" fill="#CFFAFE" fill-opacity="0.6"/>
  </g>
  <!-- dashed flight path -->
  <path d="M922 408C1010 300 1180 280 1330 232" stroke="url(#acc)" stroke-width="6" stroke-linecap="round" stroke-dasharray="2 20"/>
  <circle cx="922" cy="408" r="14" fill="#FFFFFF" stroke="#10B981" stroke-width="7"/>
  <circle cx="1330" cy="232" r="14" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="7"/>
  <!-- plane -->
  <g transform="translate(1148,318) rotate(-26)">
    <path d="M-34 0L30 -16L30 16Z" fill="#0EA5E9"/>
    <path d="M-6 -2L34 -2L34 2L-6 2Z" fill="#10B981"/>
  </g>

  <!-- destination cards -->
  <g filter="url(#sh)">
    <rect x="836" y="540" width="300" height="210" rx="28" fill="#FFFFFF"/>
    <rect x="1160" y="540" width="300" height="210" rx="28" fill="#FFFFFF"/>
  </g>
  <!-- card 1 thumbnail (beach/sun) -->
  <clipPath id="t1"><rect x="860" y="564" width="252" height="110" rx="16"/></clipPath>
  <g clip-path="url(#t1)">
    <rect x="860" y="564" width="252" height="110" fill="#D1FAE5"/>
    <circle cx="1066" cy="600" r="26" fill="#FCD34D"/>
    <path d="M860 656C920 620 1000 644 1052 624C1090 610 1112 628 1112 628V674H860Z" fill="#34D399"/>
  </g>
  <rect x="862" y="692" width="150" height="16" rx="8" fill="#D1FAE5"/>
  <rect x="862" y="718" width="100" height="14" rx="7" fill="#E2E8F0"/>
  <!-- card 2 thumbnail (mountain) -->
  <clipPath id="t2"><rect x="1184" y="564" width="252" height="110" rx="16"/></clipPath>
  <g clip-path="url(#t2)">
    <rect x="1184" y="564" width="252" height="110" fill="#CFFAFE"/>
    <path d="M1184 674L1276 588L1336 648L1380 606L1436 674Z" fill="#22D3EE"/>
    <circle cx="1216" cy="592" r="18" fill="#FCD34D"/>
  </g>
  <rect x="1186" y="692" width="150" height="16" rx="8" fill="#CFFAFE"/>
  <rect x="1186" y="718" width="100" height="14" rx="7" fill="#E2E8F0"/>
</svg>
