  <text x="150" y="652" fill="#4338CA" font-size="48" font-family="Poppins, Inter, sans-serif" font-weight="800">8,300+</text>
  <text x="150" y="694" fill="#64748B" font-size="26" font-family="Inter, sans-serif">reviews processed</text>
  <text x="474" y="652" fill="#4338CA" font-size="48" font-family="Poppins, Inter, sans-serif" font-weight="800">82%</text>
  <text x="474" y="694" fill="#64748B" font-size="26" font-family="Inter, sans-serif">model accuracy</text>

  <!-- dashboard panel -->
