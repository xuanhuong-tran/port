  </defs>

  <rect width="1600" height="900" rx="56" fill="url(#bg)"/>
  <circle cx="1378" cy="150" r="150" fill="#FFFFFF" fill-opacity="0.5"/>
  <circle cx="205" cy="775" r="175" fill="#FFFFFF" fill-opacity="0.38"/>
  <circle cx="700" cy="820" r="90" fill="#C7D2FE" fill-opacity="0.45"/>

  <!-- eyebrow -->
  <rect x="120" y="146" width="356" height="58" rx="29" fill="#FFFFFF" fill-opacity="0.75"/>
