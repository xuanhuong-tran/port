  <path d="M836 188a38 38 0 0 1 38-38h548a38 38 0 0 1 38 38v46H836z" fill="#EEF2FF"/>
  <circle cx="886" cy="192" r="13" fill="#4F46E5"/>
  <rect x="916" y="180" width="230" height="24" rx="12" fill="#C7D2FE"/>
  <rect x="1318" y="180" width="100" height="24" rx="12" fill="#E0E7FF"/>

